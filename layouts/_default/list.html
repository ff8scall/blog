{{ define "main" }}
<div class="section-page">
  <div class="container">

    <header class="section-header">
      <h1 class="section-title">{{ .Title }}</h1>
      <p class="section-count">총 {{ .Paginator.TotalNumberOfElements }}개의 포스트</p>
    </header>

    <div class="card-grid">
      {{ range .Paginator.Pages }}
        {{ partial "card.html" . }}
      {{ end }}
    </div>

    {{ template "_internal/pagination.html" . }}

  </div>
</div>
{{ end }}
