<article class="premium-card">
  <a href="{{ .RelPermalink }}" class="card-link" aria-label="{{ .Title }} 읽기">
    <div class="card-image-wrap" style="position: relative; aspect-ratio: 16/9; overflow: hidden;">
      {{ if .Params.image }}
      <img src="{{ .Params.image }}" alt="{{ .Title }}" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease;">
      {{ else }}
      <div style="width: 100%; height: 100%; background: var(--p-gradient); opacity: 0.2;"></div>
      {{ end }}
      <div class="card-category" style="position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1);">
        {{ if .Params.categories }}{{ index .Params.categories 0 }}{{ else }}NEWS{{ end }}
      </div>
    </div>
    
    <div class="card-content" style="padding: 24px;">
      <time class="card-date" style="font-size: 0.8rem; color: var(--p-text-muted); margin-bottom: 12px; display: block;">
        {{ .Date.Format "2006.01.02" }}
      </time>
      <h3 class="card-title" style="font-size: 1.25rem; line-height: 1.4; margin-bottom: 12px; color: var(--p-text-main); font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color 0.3s;">
        {{ .Title }}
      </h3>
      <p class="card-desc" style="font-size: 0.95rem; color: var(--p-text-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0;">
        {{ .Description | default .Summary }}
      </p>
    </div>
  </a>
</article>
