<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="{{ .Site.Home.RelPermalink }}" class="site-logo">
          <span class="logo-accent">NEWS</span>.lego-sia.com
        </a>
        <p class="footer-desc">{{ .Site.Params.description }}</p>
      </div>

      <nav class="footer-nav" aria-label="바닥 메뉴">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relLangURL }}" class="footer-nav-link">{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>

    <div class="footer-bottom">
      <p class="copyright">&copy; {{ now.Year }} news.lego-sia.com. All rights reserved.</p>
    </div>
  </div>
</footer>
