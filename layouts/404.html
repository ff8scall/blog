{{ define "main" }}
<div class="error-page">
  <div class="container">
    <div class="error-inner">
      <p class="error-code">404</p>
      <h1 class="error-title">페이지를 찾을 수 없어요</h1>
      <p class="error-desc">요청하신 페이지가 이동되었거나 삭제되었을 수 있습니다.</p>
      <a href="{{ .Site.BaseURL }}" class="btn btn--primary">홈으로 돌아가기</a>

      {{/* ── 최신 글 추천 (이탈 방지) ── */}}
      <div class="error-recommend">
        <p class="recommend-label">👇 대신 이 글은 어떠세요?</p>
        <div class="card-grid card-grid--compact">
          {{ range first 3 .Site.RegularPages }}
            {{ partial "card.html" . }}
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
