name: Lego-Sia Daily Tech Intelligence

on:
  schedule:
    - cron: '0 */2 * * *' # 2시간마다 자동 실행
  workflow_dispatch: # 수동 테스트 버튼

permissions:
  contents: write

jobs:
  harvest-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_ORG_KEY: ${{ secrets.NEWSAPI_ORG_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          CURRENTSAPI_KEY: ${{ secrets.CURRENTSAPI_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python automation/news_main.py
      - name: Commit and Push
        run: |
          git config --global user.name "Lego-Sia AI Bot"
          git config --global user.email "bot@lego-sia.com"
          git add .
          git commit -m "auto: periodic tech intelligence update [skip ci]" || echo "No changes"
          git push origin main
