[params]
  theme = "lego-sia-premium"
  author = "Lego-Sia Editor"
  siteName = "news.lego-sia.com"
  logo = "/images/logo.svg"
  indexNowKey = "bd9cab15af0446658b1e7bd00b8120ca"
  
  [params.social]
    github = "https://github.com/lego-sia"
    twitter = "https://twitter.com/legosia"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term    = ["HTML", "RSS"]
