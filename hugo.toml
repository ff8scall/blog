baseURL = "https://blog.lego-sia.com/"
languageCode = "ko"
defaultContentLanguage = "ko"
title = "blog.lego-sia.com"
paginate = 10
enableRobotsTXT = true
enableGitInfo = true
removePathAccents = false

[params]
  siteName = "blog.lego-sia.com"
  siteDescription = "캠핑, 라이프스타일, 테크 트렌드를 빠르게 전달하는 프리미엄 정보 블로그"
  author = "Lego-sia"
  logo = "/images/logo.svg"

  # 소셜 미디어 (Open Graph / Twitter Cards 용)
  twitterHandle = ""
  ogImage = "/images/og-default.jpg"

  # 애드센스
  googleAdSense = ""  # AdSense Publisher ID (ex: ca-pub-XXXXXXXXXXXXXXXX)

  # 애널리틱스
  googleAnalytics = ""  # GA4 Measurement ID (ex: G-XXXXXXXXXX)

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # HTML in Markdown 허용 (shortcodes 확장용)
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[[menus.main]]
  name = "캠핑"
  url = "/camping/"
  weight = 1

[[menus.main]]
  name = "IT·테크"
  url = "/it/"
  weight = 2

[[menus.main]]
  name = "라이프스타일"
  url = "/lifestyle/"
  weight = 3

[[menus.main]]
  name = "요리"
  url = "/cooking/"
  weight = 4
