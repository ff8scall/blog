baseURL = "https://news.lego-sia.com/"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[languages]
  [languages.ko]
    languageCode = "ko-kr"
    languageName = "한국어"
    title = "레고-시아 전략 매거진"
    weight = 1
    contentDir = "content/ko"
    [languages.ko.params]
      description = "AI 전략, 수익화, 고성능 하드웨어를 다루는 프리미엄 테크 매거진"
      heroTitle = "글로벌 테크 인텔리전스"
      heroSub = "인공지능부터 비즈니스 전략까지, 당신의 지성을 깨우는 가장 날카로운 통찰."
      siteTag = "AI STRATEGY MAGAZINE"
      latestPostTitle = "최신 인텔리전스"

  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    title = "Lego-Sia Strategy Magazine"
    weight = 2
    contentDir = "content/en"
    [languages.en.params]
      description = "Premium Tech Magazine covering AI Strategy, Monetization, and High-Performance Hardware."
      heroTitle = "Global Tech Intelligence"
      heroSub = "The sharpest insights for the AI revolution and digital monetization."
      siteTag = "AI STRATEGY MAGAZINE"
      latestPostTitle = "Latest Intelligence"

